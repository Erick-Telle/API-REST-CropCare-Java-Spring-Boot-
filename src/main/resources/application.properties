# =============================================================================
# CropCare API - Configuración base
# =============================================================================
#
# DESARROLLO LOCAL:
#   Perfil H2 (por defecto):     mvn spring-boot:run
#   PostgreSQL local:            mvn spring-boot:run -Dspring-boot.run.profiles=local-postgres
#
# PRODUCCIÓN (Render):
#   SPRING_PROFILES_ACTIVE=production
# =============================================================================

spring.application.name=CropCare API
spring.profiles.default=h2

# JPA
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Jackson - fechas ISO-8601
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss

# OpenAPI / Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
