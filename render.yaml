services:
  - type: web
    name: cropcare-api
    runtime: docker
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: cropcare-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: cropcare-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: cropcare-db
          property: password
    healthCheckPath: /api/species

databases:
  - name: cropcare-db
    plan: free
    databaseName: cropcare
    user: cropcare_user
